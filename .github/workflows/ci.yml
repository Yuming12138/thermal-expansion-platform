name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      UV_LINK_MODE: copy
      PYTHONUTF8: "1"
    steps:
      - name: Check out source and data snapshots
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install the public catalog when absent
        run: >-
          uv run python -c "from te_platform.api.services import ensure_catalog_database;
          from te_platform.config import DEFAULT_CATALOG_DATABASE_PATH;
          ensure_catalog_database(DEFAULT_CATALOG_DATABASE_PATH, allow_download=True)"

      - name: Check browser JavaScript syntax
        run: node --check src/te_platform/web/app.js

      - name: Run unit and API tests
        run: uv run python -m unittest discover -s tests -q

      - name: Check repository whitespace
        run: git diff --check

  public-package:
    name: Verify public portable package
    runs-on: ubuntu-latest
    needs: test
    env:
      UV_LINK_MODE: copy
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Install catalog and build public package
        run: |
          uv run python -c "from te_platform.api.services import ensure_catalog_database; from te_platform.config import DEFAULT_CATALOG_DATABASE_PATH; ensure_catalog_database(DEFAULT_CATALOG_DATABASE_PATH, allow_download=True)"
          uv run python scripts/build-portable-release.py
      - name: Assert private configuration is excluded
        run: |
          test ! -f portable-release/thermal-expansion-platform-v0.10.0-portable/var/config/agent.env
          test -f portable-release/thermal-expansion-platform-v0.10.0-portable/var/releases/catalog-v1.sqlite
          grep -q '"contains_private_agent_config": false' portable-release/thermal-expansion-platform-v0.10.0-portable/PORTABLE-MANIFEST.json
